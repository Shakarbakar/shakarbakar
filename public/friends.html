<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Friends List - ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        margin: 0;
        background-image: url("images/arena-background.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .page {
        max-width: 1400px;
        margin: auto;
        padding: 40px 20px;
      }

      .title {
        text-align: center;
        font-size: 52px;
        color: #fbbf24;
      }

      .subtitle {
        text-align: center;
        color: #cbd5e1;
        margin-bottom: 40px;
      }

      .friends-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }

      .friend-card {
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .friend-name {
        font-size: 24px;
        color: #fbbf24;
        margin-bottom: 10px;
      }

      .online {
        color: #22c55e;
      }

      .offline {
        color: #94a3b8;
      }

      .btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: white;
      }

      .message-btn {
        background: #7c3aed;
      }

      .duel-btn {
        background: #dc2626;
      }

      .remove-btn {
        background: #475569;
      }

      .home-link {
        text-align: center;
        margin-top: 30px;
      }

      .home-link a {
        color: #93c5fd;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <h1 class="title">👥 FRIENDS LIST</h1>

      <p class="subtitle">Your football friends and rivals.</p>

      <div class="friends-grid">
        <div class="friend-card">
          <div class="friend-name">shakar1</div>

          <div class="online">🟢 Online</div>

          <button class="btn message-btn">Private Message</button>

          <button class="btn duel-btn">Challenge To Duel</button>

          <button class="btn remove-btn">Remove Friend</button>
        </div>
      </div>

      <div class="home-link">
        <a href="arena-chat.html"> ← Back to Arena Chat </a>
      </div>

      <div class="home-link">
        <a href="index.html"> ← Back to Home </a>
      </div>
    </div>
  </body>
</html>
