<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Friends List - ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        margin: 0;
        background-image: url("images/arena-background.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .page {
        max-width: 1400px;
        margin: auto;
        padding: 40px 20px;
      }

      .title {
        text-align: center;
        font-size: 52px;
        color: #fbbf24;
      }

      .subtitle {
        text-align: center;
        color: #cbd5e1;
        margin-bottom: 40px;
      }

      .friends-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 25px;
        align-items: start;
      }

      .friend-card {
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-align: center;
        transition: all 0.25s ease;
      }

      .friend-card:hover {
        transform: translateY(-6px);
        border-color: #fbbf24;
        box-shadow: 0 0 20px rgba(251, 191, 36, 0.25);
      }

      .friend-avatar {
        font-size: 64px;
        margin-bottom: 10px;
      }

      .friend-name {
        font-size: 26px;
        color: #fbbf24;
        margin-bottom: 10px;
        font-weight: bold;
      }

      .online {
        color: #22c55e;
        margin-bottom: 15px;
      }

      .offline {
        color: #94a3b8;
        margin-bottom: 15px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: white;
        font-size: 15px;
        font-weight: bold;
      }

      .message-btn {
        background: #7c3aed;
      }

      .duel-btn {
        background: #dc2626;
      }

      .remove-btn {
        background: #475569;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .home-link {
        text-align: center;
        margin-top: 30px;
      }

      .home-link a {
        color: #93c5fd;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <h1 class="title">👥 FRIENDS LIST</h1>

      <p class="subtitle">Your football friends and rivals.</p>

      <div class="friends-grid" id="friendsGrid">
        <!-- Loaded dynamically by friends.js -->
      </div>

      <div class="home-link">
        <a href="arena-chat.html"> ← Back to Arena Chat </a>
      </div>

      <div class="home-link">
        <a href="index.html"> ← Back to Home </a>
      </div>
    </div>

    <script src="js/friends.js"></script>
  </body>
</html>
