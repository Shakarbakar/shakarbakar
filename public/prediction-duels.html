<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Prediction Duels - ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        margin: 0;
        background-image: url("images/arena-background.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .duels-page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .duels-title {
        text-align: center;
        font-size: 52px;
        color: #fbbf24;
        margin-bottom: 10px;
      }

      .duels-subtitle {
        text-align: center;
        color: #cbd5e1;
        margin-bottom: 40px;
      }

      .duels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }

      .duel-card {
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 25px;
      }

      .duel-card h2 {
        margin-top: 0;
        color: #fbbf24;
      }

      .duel-card p {
        color: #cbd5e1;
      }

      label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
        color: #cbd5e1;
        font-size: 14px;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border-radius: 10px;
        border: none;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        margin-top: 15px;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #16a34a;
      }

      .home-link {
        text-align: center;
        margin-top: 30px;
      }

      .home-link a {
        color: #93c5fd;
        text-decoration: none;
      }

      .duel-history-item {
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      #customQuestionContainer,
      #customPredictionContainer {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="duels-page">
      <h1 class="duels-title">⚔️ PREDICTION DUELS</h1>

      <p class="duels-subtitle">
        Challenge players. Make predictions. Earn glory.
      </p>

      <div class="duels-grid">
        <div class="duel-card">
          <h2>⚔️ Create Duel</h2>

          <label>Select Friend</label>

          <select id="duelOpponent">
            <option value="">Loading friends...</option>
          </select>

          <label>Duel Title</label>

          <input
            id="duelTitle"
            type="text"
            placeholder="Example: World Cup Duel"
          />

          <label>Prediction Question</label>

          <select id="duelQuestion" onchange="handleQuestionChange()">
            <option value="">Select Question</option>

            <option value="Will Brazil win?">Will Brazil win?</option>

            <option value="Will France reach semifinals?">
              Will France reach semifinals?
            </option>

            <option value="Will Argentina score first?">
              Will Argentina score first?
            </option>

            <option value="Will Germany reach semifinals?">
              Will Germany reach semifinals?
            </option>

            <option value="Will Spain keep a clean sheet?">
              Will Spain keep a clean sheet?
            </option>

            <option value="custom">Custom Question...</option>
          </select>

          <div id="customQuestionContainer">
            <label>Custom Question</label>

            <textarea
              id="customQuestion"
              placeholder="Enter your custom question"
            ></textarea>
          </div>

          <div id="predictionDropdownContainer">
            <label>Your Prediction</label>

            <select id="duelPrediction">
              <option value="">Select Prediction</option>

              <option value="Yes">Yes</option>

              <option value="No">No</option>
            </select>
          </div>

          <div id="customPredictionContainer">
            <label>Put Your Prediction</label>

            <input
              id="customPrediction"
              type="text"
              placeholder="Enter your prediction"
            />
          </div>

          <button onclick="createDuel()">Create Duel</button>
        </div>

        <div class="duel-card">
          <h2>📥 Pending Duels</h2>

          <div id="pendingDuels">No pending duels.</div>
        </div>

        <div class="duel-card">
          <h2>⚔️ Active Duels</h2>

          <div id="activeDuels">No active duels.</div>
        </div>

        <div class="duel-card">
          <h2>🏆 Duel History</h2>

          <div id="duelHistory">No duels yet.</div>
        </div>

        <div class="duel-card">
  <h2>🎯 Arena Rankings</h2>

  <div id="arenaRankings">
    Loading rankings...
  </div>
</div>

      <div class="home-link">
        <a href="arena.html">← Back to Arena</a>
      </div>

      <div class="home-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>

    <script>
      function handleQuestionChange() {
        const question = document.getElementById("duelQuestion").value;

        const customQuestionContainer = document.getElementById(
          "customQuestionContainer",
        );

        const customPredictionContainer = document.getElementById(
          "customPredictionContainer",
        );

        const predictionDropdownContainer = document.getElementById(
          "predictionDropdownContainer",
        );

        const prediction = document.getElementById("duelPrediction");

        if (question === "custom") {
          customQuestionContainer.style.display = "block";

          customPredictionContainer.style.display = "block";

          predictionDropdownContainer.style.display = "none";

          return;
        }

        customQuestionContainer.style.display = "none";

        customPredictionContainer.style.display = "none";

        predictionDropdownContainer.style.display = "block";

        prediction.innerHTML = "";

        const emptyOption = document.createElement("option");

        emptyOption.value = "";

        emptyOption.textContent = "Select Prediction";

        prediction.appendChild(emptyOption);

        if (
          question.includes("Will") ||
          question.includes("qualify") ||
          question.includes("semifinals") ||
          question.includes("clean sheet")
        ) {
          prediction.innerHTML += `
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          `;
        }
      }
    </script>

    <script>
  async function loadArenaRankings() {
    try {
      const response = await fetch("/api/users/rankings");

      const data = await response.json();

      const container = document.getElementById("arenaRankings");

      if (!container) {
        return;
      }

      container.innerHTML = "";

      if (!data.success || data.rankings.length === 0) {
        container.innerHTML = "No rankings yet.";
        return;
      }

      data.rankings.forEach((player, index) => {
        const div = document.createElement("div");

        div.className = "duel-history-item";

        div.innerHTML =
          "<strong>#" +
          (index + 1) +
          " " +
          player.username +
          "</strong><br>" +
          "Arena Score: " +
          player.arenaScore +
          "<br>" +
          "Wins: " +
          player.duelWins +
          " | Losses: " +
          player.duelLosses +
          " | Draws: " +
          player.duelDraws;

        container.appendChild(div);
      });
    } catch (error) {
      console.error(error);
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadArenaRankings();
  });
</script>

    <script src="js/duels.js"></script>
  </body>
</html>
