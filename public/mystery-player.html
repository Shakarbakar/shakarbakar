<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystery Player - ShakarBakar</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/fun-zone.css" />
  </head>
  <body data-game="mystery-player">
    <nav class="fun-nav">
      <a class="fun-logo" href="index.html">SHAKARBAKAR</a>
      <div class="fun-links">
        <a href="fun-zone.html">Fun Zone</a>
        <a href="arena.html">Arena</a>
      </div>
    </nav>
    <main class="fun-page">
      <section class="fun-hero">
        <h1>Mystery Player</h1>
        <p>Use hints to guess the hidden footballer.</p>
      </section>
      <section class="fun-panel game-stage">
        <div class="mystery-card">
          <div class="mystery-silhouette">?</div>
          <div>
            <h2>Hidden Football Star</h2>
            <p class="fun-note">Unlock clues after wrong guesses. Solve the mystery before all hints appear.</p>
          </div>
        </div>
        <ul id="hintList" class="hint-list"></ul>
        <div class="answer-row">
          <input id="answerInput" type="text" placeholder="Player name" />
          <button id="submitAnswer" class="fun-button">Guess</button>
          <button id="nextChallenge" class="fun-button secondary">Next</button>
        </div>
        <div id="gameStatus" class="game-status"></div>
      </section>
    </main>
    <script src="js/fun-zone-data.js"></script>
    <script src="js/fun-zone-games.js"></script>
      <script src="js/translations.js"></script>
  </body>
</html>
