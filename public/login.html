<!doctype html>
<html lang="en">
  <head>
    <!--
==================================================
LOGIN PAGE - SHAKARBAKAR
==================================================

This page lets existing users log in with their
username or email and password.

Uses shared CSS (style.css) and shared JS (app.js).

==================================================
-->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - ShakarBakar</title>

    <!-- Shared stylesheet for all auth pages -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/flags.css" />

    <style>
      body {
        min-height: 100vh;
        background:
          linear-gradient(rgba(2, 6, 23, 0.76), rgba(2, 6, 23, 0.9)),
          url("images/arena-background.jpg") center / cover fixed;
      }

      .password-field {
        position: relative;
      }

      .password-field input {
        padding-right: 55px;
      }

      .password-eye {
        position: absolute;
        top: 18px;
        right: 8px;
        width: 42px;
        padding: 8px;
        background: transparent;
        color: white;
        font-size: 20px;
        line-height: 1;
      }

      .password-eye:hover {
        background: #334155;
      }

      .show-password-row {
        margin-top: -10px;
        margin-bottom: 16px;
      }

      .login-updates-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow-y: auto;
        background-image:
          radial-gradient(
            circle at 50% 15%,
            rgba(37, 99, 235, 0.24),
            transparent 42%
          ),
          linear-gradient(rgba(2, 6, 23, 0.42), rgba(2, 6, 23, 0.56)),
          url("images/arena-background.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        backdrop-filter: blur(2px) saturate(115%);
        animation: arena-overlay-fade 320ms ease-out;
      }

      .login-updates-overlay.hidden {
        display: none;
      }

      .login-updates-panel {
        position: relative;
        isolation: isolate;
        width: min(760px, 100%);
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        padding: 30px;
        border: 1px solid rgba(96, 165, 250, 0.48);
        border-top-color: rgba(251, 191, 36, 0.7);
        border-radius: 24px;
        background: linear-gradient(
          145deg,
          rgba(15, 50, 96, 0.92),
          rgba(8, 27, 58, 0.94)
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 38px rgba(37, 99, 235, 0.32),
          0 28px 90px rgba(0, 0, 0, 0.68);
        animation: arena-panel-enter 460ms
          cubic-bezier(0.22, 1, 0.36, 1);
      }

      .login-updates-panel::before {
        position: absolute;
        inset: 0;
        z-index: -1;
        border-radius: inherit;
        background:
          linear-gradient(
            115deg,
            rgba(255, 255, 255, 0.09),
            transparent 32%
          ),
          radial-gradient(
            circle at 90% 0%,
            rgba(59, 130, 246, 0.22),
            transparent 36%
          );
        content: "";
        pointer-events: none;
      }

      .login-updates-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .login-updates-title {
        margin: 10px 0 8px;
        color: #fcd34d;
        text-align: left;
        font-size: clamp(28px, 5vw, 38px);
        letter-spacing: -0.02em;
        text-shadow: 0 0 24px rgba(251, 191, 36, 0.22);
      }

      .login-updates-subtitle {
        margin: 0 0 22px;
        color: #bfdbfe;
        text-align: left;
      }

      .login-updates-live-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 6px 11px;
        border: 1px solid rgba(251, 191, 36, 0.46);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.62);
        color: #fde68a;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        box-shadow: 0 0 18px rgba(251, 191, 36, 0.1);
      }

      .login-updates-live-badge::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 10px #22c55e;
        content: "";
        animation: live-pulse 1.8s ease-in-out infinite;
      }

      .login-updates-close-icon {
        flex: 0 0 auto;
        width: 40px;
        height: 40px;
        padding: 0;
        border: 1px solid rgba(147, 197, 253, 0.24);
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.42);
        color: #dbeafe;
        font-size: 28px;
        line-height: 1;
      }

      .login-updates-close-icon:hover {
        border-color: rgba(251, 191, 36, 0.55);
        background: rgba(30, 64, 175, 0.45);
        color: #fcd34d;
      }

      .login-update-card {
        position: relative;
        padding: 18px 20px 18px 23px;
        margin-bottom: 13px;
        overflow: hidden;
        border: 1px solid rgba(96, 165, 250, 0.22);
        border-radius: 16px;
        background: linear-gradient(
          100deg,
          rgba(30, 64, 175, 0.25),
          rgba(15, 23, 42, 0.58)
        );
        box-shadow:
          0 12px 30px rgba(2, 6, 23, 0.24),
          0 1px 0 rgba(255, 255, 255, 0.04) inset;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .login-update-card::before {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 4px;
        background: linear-gradient(#fbbf24, #3b82f6);
        content: "";
      }

      .login-update-card:hover {
        transform: translateY(-2px);
        border-color: rgba(251, 191, 36, 0.38);
        background: linear-gradient(
          100deg,
          rgba(30, 64, 175, 0.34),
          rgba(15, 23, 42, 0.64)
        );
      }

      .login-update-title {
        color: #f8fafc;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.35;
      }

      .login-update-category {
        display: inline-flex;
        margin: 8px 0 11px;
        padding: 4px 9px;
        border: 1px solid rgba(96, 165, 250, 0.3);
        border-radius: 999px;
        background: rgba(30, 64, 175, 0.3);
        color: #bfdbfe;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .login-update-content {
        color: #e2e8f0;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .login-update-date {
        margin-top: 12px;
        color: #93c5fd;
        font-size: 13px;
      }

      .login-updates-footer {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid rgba(147, 197, 253, 0.2);
      }

      .login-updates-footer p {
        margin: 0 0 8px;
        color: #cbd5e1;
      }

      .login-updates-link {
        display: block;
        color: #fcd34d;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
      }

      .login-updates-link:hover {
        text-decoration: underline;
      }

      .login-updates-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 22px;
      }

      .login-updates-actions button {
        min-width: 165px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 22px rgba(2, 6, 23, 0.28);
      }

      .login-updates-actions button:not(.login-updates-secondary) {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }

      .login-updates-actions button:not(.login-updates-secondary):hover {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
      }

      .login-updates-secondary {
        background: rgba(51, 65, 85, 0.72);
      }

      .login-updates-secondary:hover {
        background: rgba(71, 85, 105, 0.9);
      }

      @keyframes arena-overlay-fade {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes arena-panel-enter {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes live-pulse {
        0%,
        100% {
          opacity: 0.65;
          transform: scale(0.88);
        }

        50% {
          opacity: 1;
          transform: scale(1.08);
        }
      }

      @media (max-width: 600px) {
        .login-updates-overlay {
          align-items: flex-start;
          padding: 12px;
        }

        .login-updates-panel {
          max-height: calc(100vh - 24px);
          padding: 20px 16px;
          border-radius: 18px;
        }

        .login-updates-header {
          gap: 10px;
        }

        .login-updates-title {
          font-size: 27px;
        }

        .login-update-card {
          padding: 16px 15px 16px 19px;
        }

        .login-updates-actions {
          flex-direction: column-reverse;
        }

        .login-updates-actions button {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .login-updates-overlay,
        .login-updates-panel,
        .login-updates-live-badge::before {
          animation: none;
        }

        .login-update-card {
          transition: none;
        }
      }
    </style>

    <script src="js/translations.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1 data-translate="welcomeBack">Welcome Back</h1>

        <p data-translate="loginToAccount">
          Log in to your ShakarBakar account.
        </p>

        <!-- USERNAME OR EMAIL -->
        <input id="identifier" type="text" placeholder="Username or Email" />

        <!-- PASSWORD -->
        <div class="password-field">
          <input id="password" type="password" placeholder="Password" />

          <button
            id="passwordEye"
            class="password-eye"
            type="button"
            aria-label="Show password"
            aria-pressed="false"
            onclick="togglePasswordVisibility()"
          >
            👁
          </button>
        </div>

        <div class="show-password-row">
          <label class="remember-label">
            <input
              id="showPassword"
              type="checkbox"
              onchange="setPasswordVisibility(this.checked)"
            />

            Show Password
          </label>
        </div>

        <!-- REMEMBER ME + FORGOT PASSWORD -->
        <div class="remember-row">
          <label class="remember-label">
            <input id="rememberMe" type="checkbox" />

            Remember Me
          </label>

          <!-- Forgot password will be implemented in a future version -->
          <a class="forgot-link" href="#"> Forgot Password? </a>
        </div>

        <!-- LOGIN BUTTON -->
        <button onclick="loginUser()" data-translate="login">Log In</button>

        <!-- RESULT MESSAGE -->
        <div id="message" class="message"></div>

        <!-- LINK TO REGISTER PAGE -->
        <div class="auth-link">
          Don't have an account?
          <a href="register.html" data-translate="signup">Register Here</a>
        </div>

        <div class="home-link">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>

    <div
      id="loginUpdatesOverlay"
      class="login-updates-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="loginUpdatesTitle"
    >
      <section class="login-updates-panel">
        <div class="login-updates-header">
          <div>
            <div class="login-updates-live-badge">
              ⚽ WORLD CUP LIVE UPDATES
            </div>

            <h1 id="loginUpdatesTitle" class="login-updates-title">
              📢 Latest Arena Updates
            </h1>

            <p class="login-updates-subtitle">
              Here's what happened while you were away.
            </p>
          </div>

          <button
            type="button"
            class="login-updates-close-icon"
            aria-label="Close updates and continue to Home"
            onclick="continueAfterLoginUpdates()"
          >
            ×
          </button>
        </div>

        <div id="loginUpdatesList"></div>

        <footer class="login-updates-footer">
          <p>Want to see older announcements?</p>

          <a
            class="login-updates-link"
            href="arena-announcements.html"
            onclick="markLoginUpdatesSeen()"
          >
            View the complete Arena Announcements page →
          </a>

          <div class="login-updates-actions">
            <button
              type="button"
              class="login-updates-secondary"
              onclick="continueAfterLoginUpdates()"
            >
              Close
            </button>

            <button type="button" onclick="continueAfterLoginUpdates()">
              Continue to Home
            </button>
          </div>
        </footer>
      </section>
    </div>

    <!-- Shared JavaScript for login logic -->
    <script src="js/flags.js"></script>
    <script src="js/app.js"></script>

    <script>
      function setPasswordVisibility(showPassword) {
        const passwordInput = document.getElementById("password");
        const checkbox = document.getElementById("showPassword");
        const eyeButton = document.getElementById("passwordEye");

        passwordInput.type = showPassword ? "text" : "password";
        checkbox.checked = showPassword;
        eyeButton.textContent = showPassword ? "🙈" : "👁";
        eyeButton.setAttribute(
          "aria-label",
          showPassword ? "Hide password" : "Show password",
        );
        eyeButton.setAttribute("aria-pressed", String(showPassword));
      }

      function togglePasswordVisibility() {
        const passwordInput = document.getElementById("password");

        setPasswordVisibility(passwordInput.type === "password");
      }
    </script>
  </body>
</html>
