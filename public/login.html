<!doctype html>
<html lang="en">
  <head>
    <!--
==================================================
LOGIN PAGE - SHAKARBAKAR
==================================================

This page lets existing users log in with their
username or email and password.

Uses shared CSS (style.css) and shared JS (app.js).

==================================================
-->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - ShakarBakar</title>

    <!-- Shared stylesheet for all auth pages -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/flags.css" />

    <style>
      .password-field {
        position: relative;
      }

      .password-field input {
        padding-right: 55px;
      }

      .password-eye {
        position: absolute;
        top: 18px;
        right: 8px;
        width: 42px;
        padding: 8px;
        background: transparent;
        color: white;
        font-size: 20px;
        line-height: 1;
      }

      .password-eye:hover {
        background: #334155;
      }

      .show-password-row {
        margin-top: -10px;
        margin-bottom: 16px;
      }

      .login-updates-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(2, 6, 23, 0.86);
        backdrop-filter: blur(8px);
      }

      .login-updates-overlay.hidden {
        display: none;
      }

      .login-updates-panel {
        width: min(760px, 100%);
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        padding: 28px;
        border: 1px solid rgba(251, 191, 36, 0.35);
        border-radius: 20px;
        background: #111827;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      }

      .login-updates-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .login-updates-title {
        margin-bottom: 8px;
        color: #fbbf24;
        text-align: left;
      }

      .login-updates-subtitle {
        margin: 0 0 22px;
        text-align: left;
      }

      .login-updates-close-icon {
        flex: 0 0 auto;
        padding: 4px 10px;
        background: transparent;
        color: #cbd5e1;
        font-size: 28px;
        line-height: 1;
      }

      .login-updates-close-icon:hover {
        background: #334155;
      }

      .login-update-card {
        padding: 18px;
        margin-bottom: 14px;
        border: 1px solid #334155;
        border-radius: 14px;
        background: #1e293b;
      }

      .login-update-title {
        color: #fbbf24;
        font-size: 20px;
        font-weight: bold;
      }

      .login-update-category {
        margin: 6px 0 10px;
        color: #22c55e;
        font-size: 14px;
        font-weight: bold;
      }

      .login-update-content {
        color: white;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .login-update-date {
        margin-top: 12px;
        color: #94a3b8;
        font-size: 13px;
      }

      .login-updates-footer {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid #334155;
      }

      .login-updates-footer p {
        margin: 0 0 8px;
      }

      .login-updates-link {
        display: block;
        color: #93c5fd;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
      }

      .login-updates-link:hover {
        text-decoration: underline;
      }

      .login-updates-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 22px;
      }

      .login-updates-secondary {
        background: #475569;
      }

      .login-updates-secondary:hover {
        background: #64748b;
      }

      @media (max-width: 600px) {
        .login-updates-panel {
          padding: 20px;
        }

        .login-updates-actions {
          flex-direction: column-reverse;
        }

        .login-updates-actions button {
          width: 100%;
        }
      }
    </style>

    <script src="js/translations.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1 data-translate="welcomeBack">Welcome Back</h1>

        <p data-translate="loginToAccount">
          Log in to your ShakarBakar account.
        </p>

        <!-- USERNAME OR EMAIL -->
        <input id="identifier" type="text" placeholder="Username or Email" />

        <!-- PASSWORD -->
        <div class="password-field">
          <input id="password" type="password" placeholder="Password" />

          <button
            id="passwordEye"
            class="password-eye"
            type="button"
            aria-label="Show password"
            aria-pressed="false"
            onclick="togglePasswordVisibility()"
          >
            👁
          </button>
        </div>

        <div class="show-password-row">
          <label class="remember-label">
            <input
              id="showPassword"
              type="checkbox"
              onchange="setPasswordVisibility(this.checked)"
            />

            Show Password
          </label>
        </div>

        <!-- REMEMBER ME + FORGOT PASSWORD -->
        <div class="remember-row">
          <label class="remember-label">
            <input id="rememberMe" type="checkbox" />

            Remember Me
          </label>

          <!-- Forgot password will be implemented in a future version -->
          <a class="forgot-link" href="#"> Forgot Password? </a>
        </div>

        <!-- LOGIN BUTTON -->
        <button onclick="loginUser()" data-translate="login">Log In</button>

        <!-- RESULT MESSAGE -->
        <div id="message" class="message"></div>

        <!-- LINK TO REGISTER PAGE -->
        <div class="auth-link">
          Don't have an account?
          <a href="register.html" data-translate="signup">Register Here</a>
        </div>

        <div class="home-link">
          <a href="index.html">← Back to Home</a>
        </div>
      </div>
    </div>

    <div
      id="loginUpdatesOverlay"
      class="login-updates-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="loginUpdatesTitle"
    >
      <section class="login-updates-panel">
        <div class="login-updates-header">
          <div>
            <h1 id="loginUpdatesTitle" class="login-updates-title">
              📢 Latest Arena Updates
            </h1>

            <p class="login-updates-subtitle">
              Here's what happened while you were away.
            </p>
          </div>

          <button
            type="button"
            class="login-updates-close-icon"
            aria-label="Close updates and continue to Home"
            onclick="continueAfterLoginUpdates()"
          >
            ×
          </button>
        </div>

        <div id="loginUpdatesList"></div>

        <footer class="login-updates-footer">
          <p>Want to see older announcements?</p>

          <a
            class="login-updates-link"
            href="arena-announcements.html"
            onclick="markLoginUpdatesSeen()"
          >
            View the complete Arena Announcements page →
          </a>

          <div class="login-updates-actions">
            <button
              type="button"
              class="login-updates-secondary"
              onclick="continueAfterLoginUpdates()"
            >
              Close
            </button>

            <button type="button" onclick="continueAfterLoginUpdates()">
              Continue to Home
            </button>
          </div>
        </footer>
      </section>
    </div>

    <!-- Shared JavaScript for login logic -->
    <script src="js/flags.js"></script>
    <script src="js/app.js"></script>

    <script>
      function setPasswordVisibility(showPassword) {
        const passwordInput = document.getElementById("password");
        const checkbox = document.getElementById("showPassword");
        const eyeButton = document.getElementById("passwordEye");

        passwordInput.type = showPassword ? "text" : "password";
        checkbox.checked = showPassword;
        eyeButton.textContent = showPassword ? "🙈" : "👁";
        eyeButton.setAttribute(
          "aria-label",
          showPassword ? "Hide password" : "Show password",
        );
        eyeButton.setAttribute("aria-pressed", String(showPassword));
      }

      function togglePasswordVisibility() {
        const passwordInput = document.getElementById("password");

        setPasswordVisibility(passwordInput.type === "password");
      }
    </script>
  </body>
</html>
