<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Predictions - ShakarBakar</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background-image:
          linear-gradient(rgba(2, 6, 23, 0.54), rgba(2, 6, 23, 0.82)),
          url("images/arena-background.jpg");
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .page-nav,
      .page-panel,
      .info-card {
        border: 1px solid rgba(96, 165, 250, 0.22);
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(10px);
      }

      .page-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 16px 36px;
      }

      .logo,
      .page-nav a.active,
      h1,
      h2,
      .info-card h3 {
        color: #fbbf24;
      }

      .logo {
        font-size: 25px;
        font-weight: bold;
        text-decoration: none;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
      }

      .nav-links a:hover {
        color: #fbbf24;
      }

      .page-wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 36px 18px;
      }

      .page-panel {
        margin-bottom: 22px;
        padding: 28px;
        border-radius: 24px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 5vw, 54px);
      }

      .page-note,
      .empty-state,
      .info-card p {
        color: #cbd5e1;
        line-height: 1.55;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }

      .info-card {
        padding: 18px;
        border-radius: 18px;
      }

      .info-card h3 {
        margin: 0 0 12px;
      }

      .info-card p {
        margin: 7px 0;
      }

      @media (max-width: 760px) {
        .page-nav {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 18px;
        }
      }
    </style>
  </head>

  <body data-page="my-predictions">
    <nav class="page-nav">
      <a class="logo" href="index.html">SHAKARBAKAR</a>
      <div class="nav-links">
        <a href="tournament.html">Tournament</a>
        <a class="active" href="my-predictions.html">My Predictions</a>
        <a href="predictions.html">Prediction Stats</a>
        <a href="leaderboard.html">Leaderboard</a>
      </div>
    </nav>

    <main class="page-wrap">
      <section class="page-panel">
        <h1>My Predictions</h1>
        <p class="page-note">
          Showing predictions saved locally for
          <strong id="currentUsername">Guest</strong>.
        </p>
      </section>

      <section class="page-panel">
        <h2>Prediction Status</h2>
        <div id="myPredictionsList" class="cards-grid"></div>
      </section>
    </main>

    <script src="js/tournament-storage.js"></script>
    <script src="js/tournament-pages.js"></script>
  </body>
</html>
