<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* ======================================
         NAVBAR
      ====================================== */

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(17, 24, 39, 0.75);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .logo {
        font-size: 28px;
        font-weight: bold;
        color: #fbbf24;
      }

      .nav-center {
        display: flex;
        gap: 25px;
      }

      .nav-center a,
      .nav-right a,
      .languages a {
        color: white;
        text-decoration: none;
        font-size: 16px;
      }

      .nav-center a:hover,
      .nav-right a:hover,
      .languages a:hover {
        color: #fbbf24;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .languages {
        color: #cbd5e1;
        font-size: 14px;
      }

      /* ======================================
         HERO
      ====================================== */

      .hero {
        height: calc(100vh - 70px);

        display: flex;
        flex-direction: column;

        justify-content: flex-start;

        align-items: center;

        padding-top: 40px;

        text-align: center;
      }

      h1 {
        margin: 0;

        font-size: 56px;

        color: white;

        text-shadow:
          0 2px 10px rgba(0, 0, 0, 0.9),
          0 4px 20px rgba(0, 0, 0, 0.8);
      }

      .tagline {
        margin-top: 10px;

        font-size: 24px;

        color: white;

        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
      }

      .buttons {
        margin-top: 30px;

        display: flex;

        gap: 15px;

        flex-wrap: wrap;

        justify-content: center;
      }

      .btn {
        padding: 14px 28px;

        border-radius: 10px;

        text-decoration: none;

        font-weight: bold;

        color: white;
      }

      .btn-primary {
        background: #22c55e;
      }

      .btn-secondary {
        background: #334155;
      }

      .btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">SHAKARBAKAR</div>

      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="marketplace.html">Marketplace</a>
        <a href="arena.html">Arena</a>
        <a href="#">About</a>
        <a href="#">How It Works</a>
      </div>

      <div class="nav-right">
        <div class="languages">
          <a href="#">English</a> | <a href="#">Français</a> |
          <a href="#">العربية</a>
        </div>

        <a href="login.html">Login</a>

        <a href="register.html">Sign Up</a>
      </div>
    </nav>

    <section class="hero">
      <h1>SHAKARBAKAR</h1>

      <p class="tagline">Trade. Predict. Compete.</p>

      <div class="buttons">
        <a class="btn btn-primary" href="register.html"> Claim Starter Pack </a>

        <a class="btn btn-secondary" href="marketplace.html">
          Teams Marketplace
        </a>
      </div>
    </section>
  </body>
</html>
