<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* ======================================
         NAVBAR
      ====================================== */

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(17, 24, 39, 0.75);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .logo {
        font-size: 28px;
        font-weight: bold;
        color: #fbbf24;
      }

      .nav-center {
        display: flex;
        gap: 25px;
      }

      .nav-center a,
      .nav-right a,
      .languages a {
        color: white;
        text-decoration: none;
        font-size: 16px;
      }

      .nav-center a:hover,
      .nav-right a:hover,
      .languages a:hover {
        color: #fbbf24;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .languages {
        color: #cbd5e1;
        font-size: 14px;
      }

      /* ======================================
         HERO
      ====================================== */

      /* ======================================
   HERO
====================================== */

      .hero {
        width: 100%;
      }

      .hero-image {
        width: 100%;
        height: auto;
        display: block;
      }

      .hero {
        position: relative;
      }

      .hero-overlay {
        position: absolute;

        top: 50%;

        left: 50%;

        transform: translate(-50%, -50%);

        text-align: center;

        width: 100%;

        text-shadow:
          0 2px 10px rgba(0, 0, 0, 0.9),
          0 4px 20px rgba(0, 0, 0, 0.8);
      }

      h1 {
        margin: 0;

        font-size: 34px;

        color: white;

        text-shadow:
          0 2px 6px rgba(0, 0, 0, 0.9),
          0 3px 12px rgba(0, 0, 0, 0.8);
      }

      .tagline {
        margin-top: 5px;

        font-size: 16px;

        color: white;

        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
      }

      .buttons {
        margin-top: 15px;

        display: flex;

        gap: 10px;

        flex-wrap: wrap;

        justify-content: center;
      }

      .btn {
        padding: 10px 18px;

        border-radius: 10px;

        text-decoration: none;

        font-weight: bold;

        font-size: 14px;

        min-width: 180px;

        color: white;
      }

      .btn-primary {
        background: #22c55e;
      }

      .btn-secondary {
        background: #334155;
      }

      .btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">SHAKARBAKAR</div>

      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="marketplace.html">Marketplace</a>
        <a href="arena.html">Arena</a>
        <a href="#">About</a>
        <a href="#">How It Works</a>
      </div>

      <div class="nav-right">
        <div class="languages">
          <a href="#">English</a> | <a href="#">Français</a> |
          <a href="#">العربية</a>
        </div>

        <a href="login.html">Login</a>

        <a href="register.html">Sign Up</a>
      </div>
    </nav>

    <section class="hero">
      <img
        src="images/stadium-background-v5.jpg"
        alt="ShakarBakar"
        class="hero-image"
      />

      <div class="hero-overlay">
        <h1>SHAKARBAKAR</h1>

        <p class="tagline">Trade. Predict. Compete.</p>

        <div class="buttons">
          <a class="btn btn-primary" href="register.html">
            Claim Starter Pack
          </a>

          <a
            class="btn btn-secondary"
            href="marketplace.html"
            style="background: #fbbf24; color: #111827"
          >
            Teams Marketplace
          </a>
        </div>
      </div>
    </section>
  </body>
</html>
