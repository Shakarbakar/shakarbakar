<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(17, 24, 39, 0.75);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .logo {
        font-size: 28px;
        font-weight: bold;
        color: #fbbf24;
      }

      .nav-center {
        display: flex;
        gap: 25px;
      }

      .nav-center a,
      .nav-right a,
      .languages a {
        color: white;
        text-decoration: none;
        font-size: 16px;
      }

      .nav-center a:hover,
      .nav-right a:hover,
      .languages a:hover {
        color: #fbbf24;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .languages {
        color: #cbd5e1;
        font-size: 14px;
      }

      .notification-badge {
        background: #dc2626;
        color: white;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        margin-left: 6px;
      }

      .hero {
        width: 100%;
        position: relative;
      }

      .hero-image {
        width: 100%;
        height: auto;
        display: block;
      }

      .hero-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
        text-shadow:
          0 2px 10px rgba(0, 0, 0, 0.9),
          0 4px 20px rgba(0, 0, 0, 0.8);
      }

      h1 {
        margin: 0;
        font-size: 34px;
        color: white;
      }

      .tagline {
        margin-top: 5px;
        font-size: 16px;
        color: white;
      }

      .buttons {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 14px;
        min-width: 180px;
        color: white;
      }

      .btn-primary {
        background: #22c55e;
      }

      .btn-secondary {
        background: #334155;
      }

      .btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">SHAKARBAKAR</div>

      <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="marketplace.html">Marketplace</a>
        <a href="arena.html">Arena</a>
        <a href="#">About</a>
        <a href="#">How It Works</a>
      </div>

      <div class="nav-right">
        <div class="languages">
          <a href="#">English</a> | <a href="#">Français</a> |
          <a href="#">العربية</a>
        </div>

        <div id="guestMenu">
          <a href="login.html">Login</a>
          <a href="register.html">Sign Up</a>
        </div>

        <div id="userMenu" style="display: none">
          <details style="position: relative">
            <summary id="profileName" style="cursor: pointer; color: white">
              👤 User
            </summary>

            <div
              style="
                position: absolute;
                right: 0;
                top: 30px;
                background: #111827;
                border: 1px solid #334155;
                padding: 15px;
                border-radius: 10px;
                min-width: 240px;
                z-index: 9999;
              "
            >
              <p>
                <a href="friend-requests.html">
                  📨 Friend Requests
                  <span
                    id="friendRequestBadge"
                    class="notification-badge"
                    style="display: none"
                  >
                    0
                  </span>
                </a>
              </p>

              <p>
                <a href="private-chat.html"> 📩 Inbox </a>
              </p>

              <p>
                <a href="friends.html"> 👥 Friends </a>
              </p>

              <p>
                <a href="profile.html"> ⚙️ Profile </a>
              </p>

              <p>
                <a href="#" onclick="logoutUser()"> 🚪 Logout </a>
              </p>
            </div>
          </details>
        </div>
      </div>
    </nav>

    <section class="hero">
      <img
        src="images/stadium-background-v5.jpg"
        alt="ShakarBakar"
        class="hero-image"
      />

      <div class="hero-overlay">
        <h1>SHAKARBAKAR</h1>

        <p class="tagline">Trade. Predict. Compete.</p>

        <div class="buttons">
          <a class="btn btn-primary" href="register.html">
            Claim Starter Pack
          </a>

          <a
            class="btn btn-secondary"
            href="marketplace.html"
            style="background: #fbbf24; color: #111827"
          >
            Teams Marketplace
          </a>
        </div>
      </div>
    </section>

    <script>
      const user = JSON.parse(localStorage.getItem("shakarbakar_user"));

      if (user) {
        document.getElementById("guestMenu").style.display = "none";
        document.getElementById("userMenu").style.display = "block";
        document.getElementById("profileName").innerText =
          "👤 " + user.username;

        loadPendingRequests();
      }

      async function loadPendingRequests() {
        try {
          const response = await fetch("/api/chat/friend-requests/" + user.id);

          const data = await response.json();

          if (!data.success) {
            return;
          }

          const count = data.requests.length;

          const badge = document.getElementById("friendRequestBadge");

          if (count > 0) {
            badge.style.display = "inline-block";
            badge.innerText = count;
          }
        } catch (error) {
          console.error(error);
        }
      }

      function logoutUser() {
        localStorage.removeItem("shakarbakar_user");
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
