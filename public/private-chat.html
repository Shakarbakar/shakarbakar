<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Private Chat - ShakarBakar</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        margin: 0;
        background-image: url("images/arena-background.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .page {
        max-width: 1200px;
        margin: auto;
        padding: 40px 20px;
      }

      .title {
        text-align: center;
        font-size: 52px;
        color: #fbbf24;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #cbd5e1;
        margin-bottom: 30px;
      }

      .chat-header {
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 15px;

        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .friend-name {
        font-size: 24px;
        color: #fbbf24;
        font-weight: bold;
      }

      .message-count {
        color: #cbd5e1;
      }

      .delete-btn {
        background: #dc2626;
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        cursor: pointer;
      }

      .chat-container {
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .messages {
        height: 500px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      .message-row {
        display: flex;
      }

      .my-message {
        justify-content: flex-end;
      }

      .friend-message {
        justify-content: flex-start;
      }

      .message-bubble {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 18px;
        word-wrap: break-word;
      }

      .my-bubble {
        background: #22c55e;
        color: white;
      }

      .friend-bubble {
        background: #334155;
        color: white;
      }

      .sender {
        font-size: 12px;
        opacity: 0.8;
        margin-bottom: 4px;
      }

      .input-row {
        display: flex;
        gap: 10px;
      }

      .input {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #0f172a;
        color: white;
      }

      .send-btn {
        width: 180px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        cursor: pointer;
      }

      .home-link {
        text-align: center;
        margin-top: 25px;
      }

      .home-link a {
        color: #93c5fd;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <h1 class="title">✉️ PRIVATE CHAT</h1>

      <p class="subtitle">Chat privately with your friends.</p>

      <div class="chat-header">
        <div>
          <div id="friendName" class="friend-name">Conversation</div>

          <div id="messageCount" class="message-count">0 messages</div>
        </div>

        <button class="delete-btn" onclick="deleteConversation()">
          🗑 Delete Conversation
        </button>
      </div>

      <div class="chat-container">
        <div id="messages" class="messages"></div>

        <div class="input-row">
          <input
            id="messageInput"
            class="input"
            type="text"
            placeholder="Type message..."
          />

          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>

      <div class="home-link">
        <a href="friends.html"> ← Back to Friends </a>
      </div>

      <div class="home-link">
        <a href="index.html"> ← Back to Home </a>
      </div>
    </div>

    <script src="js/chat.js"></script>

    <script>
      const params = new URLSearchParams(window.location.search);

      const otherUserId = params.get("userId");

      const currentUser = JSON.parse(localStorage.getItem("shakarbakar_user"));

      async function refreshMessages() {
        const messages = await loadMessages(otherUserId);

        const container = document.getElementById("messages");

        container.innerHTML = "";

        if (!messages) {
          return;
        }

        document.getElementById("messageCount").innerText =
          messages.length + " messages";

        messages.forEach((msg) => {
          const row = document.createElement("div");

          const mine = msg.fromUserId === currentUser.id;

          row.className = mine
            ? "message-row my-message"
            : "message-row friend-message";

          row.innerHTML = `
<div class="message-bubble ${mine ? "my-bubble" : "friend-bubble"}">
<div class="sender">
${msg.fromUsername}
</div>

${msg.message}
</div>
`;

          container.appendChild(row);
        });

        container.scrollTop = container.scrollHeight;
      }

      async function sendMessage() {
        const input = document.getElementById("messageInput");

        const text = input.value.trim();

        if (!text) {
          return;
        }

        await sendPrivateMessage(otherUserId, text);

        input.value = "";

        await refreshMessages();
      }

      document
        .getElementById("messageInput")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            sendMessage();
          }
        });

      function deleteConversation() {
        alert("Delete conversation feature will be connected next.");
      }

      document.addEventListener("DOMContentLoaded", async () => {
        await refreshMessages();

        setInterval(async () => {
          await refreshMessages();
        }, 2000);
      });
    </script>
  </body>
</html>
