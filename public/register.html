<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4c430" />
    <meta name="application-name" content="ShakarBakar" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShakarBakar" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="images/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="images/icons/icon-192.png" />


    <title>Register - ShakarBakar</title>

    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }

      .container {
        max-width: 600px;
        margin: 60px auto;
        padding: 30px;
      }

      .card {
        background: #1e293b;
        padding: 40px;
        border-radius: 15px;
      }

      h1 {
        text-align: center;
      }

      p {
        text-align: center;
        color: #cbd5e1;
      }

      input {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        margin-bottom: 20px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        box-sizing: border-box;
      }

      .password-field {
        position: relative;
      }

      .password-field input {
        padding-right: 55px;
      }

      .password-eye {
        position: absolute;
        top: 18px;
        right: 8px;
        width: 42px;
        padding: 8px;
        background: transparent;
        color: #0f172a;
        font-size: 20px;
        line-height: 1;
      }

      .password-eye:hover {
        background: #e2e8f0;
      }

      .show-password-row {
        margin-top: -10px;
        margin-bottom: 20px;
      }

      .show-password-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #cbd5e1;
        font-size: 14px;
        cursor: pointer;
      }

      .show-password-label input {
        width: 16px;
        height: 16px;
        margin: 0;
        cursor: pointer;
      }

      button {
        width: 100%;
        padding: 15px;
        background: #22c55e;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
      }

      button:hover {
        background: #16a34a;
      }

      .bonus {
        text-align: center;
        margin-top: 20px;
        color: #facc15;
        font-weight: bold;
      }

      .auth-link {
        text-align: center;
        margin-top: 25px;
        color: #cbd5e1;
      }

      .auth-link a {
        color: #93c5fd;
        text-decoration: none;
        font-weight: bold;
      }

      .home-link {
        text-align: center;
        margin-top: 25px;
      }

      .home-link a {
        color: #93c5fd;
        text-decoration: none;
      }

      .message {
        margin-top: 20px;
        text-align: center;
        font-weight: bold;
      }

      .success {
        color: #22c55e;
      }

      .error {
        color: #ef4444;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1 data-translate="createAccount">Create Account</h1>

        <p>
          <span data-translate="joinAndReceive">
            Join ShakarBakar and receive your starter pack.
          </span>
        </p>

        <input
          id="username"
          type="text"
          placeholder="Username"
          data-translate-placeholder="username"
        />

        <input
          id="email"
          type="email"
          placeholder="Email Address"
          data-translate-placeholder="emailAddress"
        />

        <div class="password-field">
          <input
            id="password"
            type="password"
            placeholder="Password"
            data-translate-placeholder="password"
          />

          <button
            id="passwordEye"
            class="password-eye"
            type="button"
            aria-label="Show password"
            aria-pressed="false"
            onclick="togglePasswordVisibility()"
          >
            👁
          </button>
        </div>

        <div class="show-password-row">
          <label class="show-password-label">
            <input
              id="showPassword"
              type="checkbox"
              onchange="setPasswordVisibility(this.checked)"
            />

            Show Password
          </label>
        </div>

        <button onclick="registerUser()" data-translate="createAccount">
          Create Account
        </button>

        <div id="message" class="message"></div>

        <div class="bonus" data-translate="starterPack">
          Starter Pack: 10,000 Bucks
        </div>

        <div class="auth-link">
          <span data-translate="alreadyHaveAccount">
            Already have an account?
          </span>

          <a href="login.html" data-translate="loginHere"> Login Here </a>
        </div>

        <div class="home-link">
          <a href="index.html" data-translate="backToHome"> Back to Home </a>
        </div>
      </div>
    </div>

    <script>
      function setPasswordVisibility(showPassword) {
        const passwordInput = document.getElementById("password");
        const checkbox = document.getElementById("showPassword");
        const eyeButton = document.getElementById("passwordEye");

        passwordInput.type = showPassword ? "text" : "password";
        checkbox.checked = showPassword;
        eyeButton.textContent = showPassword ? "🙈" : "👁";
        eyeButton.setAttribute(
          "aria-label",
          showPassword ? "Hide password" : "Show password",
        );
        eyeButton.setAttribute("aria-pressed", String(showPassword));
      }

      function togglePasswordVisibility() {
        const passwordInput = document.getElementById("password");

        setPasswordVisibility(passwordInput.type === "password");
      }

      async function registerUser() {
        const username = document.getElementById("username").value;

        const email = document.getElementById("email").value;

        const password = document.getElementById("password").value;

        const message = document.getElementById("message");

        try {
          const response = await fetch("/api/register", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              username,
              email,
              password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            message.className = "message success";

            message.innerText =
              translations[getLanguage()].accountCreatedSuccessfully;
          } else {
            message.className = "message error";

            message.innerText = data.message;
          }
        } catch (error) {
          console.error(error);

          message.className = "message error";

          message.innerText = translations[getLanguage()].serverError;
        }
      }
    </script>

    <script src="js/translations.js"></script>
      <script src="js/pwa.js"></script>
  </body>
</html>
