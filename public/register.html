<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - ShakarBakar</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:600px;
    margin:60px auto;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
}

h1{
    text-align:center;
}

p{
    text-align:center;
    color:#cbd5e1;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.bonus{
    text-align:center;
    margin-top:20px;
    color:#facc15;
    font-weight:bold;
}

.auth-link{
    text-align:center;
    margin-top:25px;
    color:#cbd5e1;
}

.auth-link a{
    color:#93c5fd;
    text-decoration:none;
    font-weight:bold;
}

.home-link{
    text-align:center;
    margin-top:25px;
}

.home-link a{
    color:#93c5fd;
    text-decoration:none;
}

.message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:#22c55e;
}

.error{
    color:#ef4444;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Create Account</h1>

        <p>
            Join ShakarBakar and receive your starter pack.
        </p>

        <!-- USERNAME -->
        <input
            id="username"
            type="text"
            placeholder="Username"
        >

        <!-- EMAIL -->
        <input
            id="email"
            type="email"
            placeholder="Email Address"
        >

        <!-- PASSWORD -->
        <input
            id="password"
            type="password"
            placeholder="Password"
        >

        <!-- REGISTER BUTTON -->
        <button onclick="registerUser()">
            Create Account
        </button>

        <!-- RESULT MESSAGE -->
        <div id="message" class="message"></div>

        <div class="bonus">
            🎁 Starter Pack: 10,000 Bucks
        </div>

        <div class="auth-link">
            Already have an account?
            <a href="login.html">Login Here</a>
        </div>

        <div class="home-link">
            <a href="index.html">← Back to Home</a>
        </div>

    </div>

</div>

<script>

/*
==================================================
REGISTER USER
==================================================
*/

async function registerUser() {

    const username =
        document.getElementById("username").value;

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    const message =
        document.getElementById("message");

    try {

        const response = await fetch(
            "/api/register",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({

                    username,
                    email,
                    password

                })
            }
        );

        const data =
            await response.json();

        if (data.success) {

            message.className =
                "message success";

            message.innerText =
                "Account created successfully!";

        }
        else {

            message.className =
                "message error";

            message.innerText =
                data.message;

        }

    }
    catch (error) {

        console.error(error);

        message.className =
            "message error";

        message.innerText =
            "Server error";

    }

}

</script>

</body>
</html>
