<!DOCTYPE html>
<html lang="en">
<head>

<!--
==================================================
TEAMS MARKETPLACE — SHAKARBAKAR
==================================================

Browse FIFA World Cup 2026 national teams.
Click a team to see details and buy.

Uses shared CSS (style.css) and shared JS (app.js).

==================================================
-->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teams Marketplace - ShakarBakar</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!--
==================================================
HEADER
==================================================
-->

<header class="marketplace-header">

    <h1>Teams Marketplace</h1>

    <p class="marketplace-tagline">
        Own your favourite national teams. Build your portfolio.
    </p>

    <div id="userBar" class="user-bar hidden">

        <span id="userGreeting"></span>

        <span id="userBalance" class="user-balance"></span>

    </div>

    <div id="loginPrompt" class="login-prompt">

        <a href="login.html">Log in</a> to buy teams.

    </div>

</header>

<!--
==================================================
TEAM GRID
==================================================

Simple display: flag + team name only.

==================================================
-->

<main class="marketplace-container">

    <div id="teamsGrid" class="teams-grid">

        <!-- Teams loaded by JavaScript -->

    </div>

    <div id="marketplaceMessage" class="message"></div>

</main>

<!--
==================================================
TEAM DETAILS POPUP
==================================================
-->

<div id="teamPopup" class="team-popup hidden">

    <div class="team-popup-card">

        <button
            class="popup-close"
            onclick="closeTeamPopup()"
            aria-label="Close"
        >
            ✕
        </button>

        <div id="popupFlag" class="popup-flag"></div>

        <h2 id="popupName"></h2>

        <p class="popup-row">
            <span class="popup-label">Base Price:</span>
            <span id="popupBasePrice"></span>
        </p>

        <p class="popup-row popup-stars">
            <span id="popupStars"></span>
        </p>

        <p class="popup-row">
            <span class="popup-label">Current Price:</span>
            <span id="popupPrice" class="popup-price"></span>
        </p>

        <p class="popup-row">
            <span class="popup-label">Qualification Status:</span>
            <span id="popupQualification"></span>
        </p>

        <p class="popup-row">
            <span class="popup-label">Ownership Status:</span>
            <span id="popupOwnership" class="popup-ownership"></span>
        </p>

        <button
            id="buyTeamButton"
            class="btn-primary"
            onclick="buyTeam()"
        >
            Buy Team
        </button>

        <div id="popupMessage" class="message"></div>

    </div>

</div>

<div
    id="popupOverlay"
    class="popup-overlay hidden"
    onclick="closeTeamPopup()"
></div>

<!--
==================================================
FOOTER LINKS
==================================================
-->

<div class="home-link marketplace-footer">
    <a href="index.html">← Back to Home</a>
</div>

<script src="js/app.js"></script>

<script>
/*
==================================================
LOAD MARKETPLACE ON PAGE OPEN
==================================================
*/
document.addEventListener("DOMContentLoaded", loadMarketplace);
</script>

</body>
</html>
